<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Stat Planner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #121216; color: #e2e2e7; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header Selector */
        .set-selector { background: #1e1e24; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; }
        .set-selector label { font-weight: bold; color: #4a90e2; }
        .main-set-dropdown { background: #2d2d35; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; outline: none; }
        
        /* Table Structure */
        .section-card { background: #1e1e24; border-radius: 8px; padding: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow-x: auto; }
        h2 { font-size: 18px; margin-bottom: 15px; border-left: 4px solid #4a90e2; padding-left: 10px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 900px; }
        th { background: #25252d; color: #888; font-size: 11px; padding: 15px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 10px 8px; border-bottom: 1px solid #2d2d35; font-size: 13px; }
        
        /* Select Dropdowns */
        .stat-select { background: transparent; color: white; border: 1px solid transparent; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; text-align: center; outline: none; font-size: 13px; }
        .stat-select:hover { background: #2d2d35; border-color: #555; }
        .stat-select option { background-color: #1e1e24; color: white; }
        .stat-select option:disabled { color: #555; background-color: #15151a; }

        /* Colors */
        .text-purple { color: #b388ff !important; font-weight: bold; }
        .text-yellow { color: #ffcc00 !important; font-weight: bold; }
        
        /* Piece Column with Image */
        .piece-col { text-align: left; padding-left: 15px; font-weight: 500; display: flex; align-items: center; gap: 15px; min-height: 55px; }
        .piece-icon { width: 40px; height: 40px; object-fit: contain; background: #25252d; border-radius: 6px; border: 1px solid #3d3d45; }
    </style>
</head>
<body>

<div class="container">
    <div class="set-selector">
        <label><i class="fas fa-filter"></i> BASE TYPE:</label>
        <select id="set-type-selector" class="main-set-dropdown" onchange="renderPlanner()">
            <option value="Intellect">Intellect (INT)</option>
            <option value="Strength">Strength (STR)</option>
            <option value="Agility">Agility (AGI)</option>
        </select>
    </div>

    <section class="section-card">
        <h2>Equipment Planner</h2>
        <table>
            <thead>
                <tr>
                    <th style="text-align: left; padding-left: 20px; width: 200px;">Piece</th>
                    <th style="width: 20%;">Main Stat</th>
                    <th style="width: 20%;">Substat</th>
                    <th style="width: 20%;">Reforge</th>
                    <th style="width: 20%;">Purple Lines</th>
                </tr>
            </thead>
            <tbody id="planner-body">
                <!-- เจนด้วย JS -->
            </tbody>
        </table>
    </section>
</div>

<script>
    const exclusionRules = {
        "Intellect": { "Head": "Crit Rate", "Armor": "Crit Rate", "Gauntlets": "Versatility", "Boots": "Luck", "Earrings": "Versatility", "Necklace": "Luck", "Ring": "Mastery", "Bracelet L": "Haste", "Bracelet R": "Mastery", "Charm": "Haste" },
        "Strength": { "Head": "Versatility", "Armor": "Luck", "Gauntlets": "Haste", "Boots": "Mastery", "Earrings": "Mastery", "Necklace": "Haste", "Ring": "Luck", "Bracelet L": "Crit Rate", "Bracelet R": "Crit Rate", "Charm": "Versatility" },
        "Agility": { "Head": "Haste", "Armor": "Mastery", "Gauntlets": "Crit Rate", "Boots": "Crit Rate", "Earrings": "Haste", "Necklace": "Mastery", "Ring": "Versatility", "Bracelet L": "Versatility", "Bracelet R": "Luck", "Charm": "Luck" }
    };

    const gearPieces = [
        { name: "Weapon", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype01.webp", type: "weapon" },
        { name: "Head", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype02.webp", type: "armor" },
        { name: "Armor", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype05.webp", type: "armor" },
        { name: "Gauntlets", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype03.webp", type: "armor" },
        { name: "Boots", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype04.webp", type: "armor" },
        { name: "Earrings", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype06.webp", type: "accessory" },
        { name: "Necklace", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype08.webp", type: "accessory" },
        { name: "Ring", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype07.webp", type: "accessory" },
        { name: "Bracelet L", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype09.webp", type: "armor" },
        { name: "Bracelet R", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype10.webp", type: "armor" },
        { name: "Charm", img: "https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/boxes/item_icons_equiptype11.webp", type: "accessory" }
    ];

    const statsList = ["Crit Rate", "Haste", "Mastery", "Luck", "Versatility"];

    const purpleOptions = {
        armor: ["Strength %", "Agility %", "Intellect %", "All Resistance", "Armor", "Max HP"],
        accessory: ["ATK", "MATK%", "Attack Speed %", "DMG% Vs Bosses", "Shield %", "Cast Speed %", "Healing Output %", "Resilience Break Efficiency %"],
        weapon: ["ATK", "MATK%", "Attack Speed %", "DMG% Vs Bosses", "Shield %", "Cast Speed %", "Healing Output %", "Resilience Break Efficiency %"]
    };

    function syncStats(selectElement) {
        const row = selectElement.closest('tr');
        const mainSelect = row.querySelector('.main-stat-select');
        const subSelect = row.querySelector('.sub-stat-select');
        const mainVal = mainSelect.value;
        const subVal = subSelect.value;

        Array.from(mainSelect.options).forEach(opt => opt.disabled = false);
        Array.from(subSelect.options).forEach(opt => opt.disabled = false);

        if (mainVal) {
            const optionToDisable = Array.from(subSelect.options).find(opt => opt.value === mainVal);
            if (optionToDisable) optionToDisable.disabled = true;
        }
        if (subVal) {
            const optionToDisable = Array.from(mainSelect.options).find(opt => opt.value === subVal);
            if (optionToDisable) optionToDisable.disabled = true;
        }
    }

    function renderPlanner() {
        const selectedType = document.getElementById('set-type-selector').value;
        const tbody = document.getElementById('planner-body');
        const rules = exclusionRules[selectedType];

        tbody.innerHTML = "";

        gearPieces.forEach(piece => {
            const excluded = rules[piece.name] || null;
            const availableStats = statsList.filter(s => s !== excluded);
            const pLineChoices = purpleOptions[piece.type] || [];

            const createOptions = (list) => {
                return `<option value="">-- Select --</option>` + 
                       list.map(opt => `<option value="${opt}">${opt}</option>`).join('');
            };

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="piece-col">
                        <img src="${piece.img}" class="piece-icon">
                        <span>${piece.name}</span>
                    </div>
                </td>
                
                <td>
                    <select class="stat-select main-stat-select" onchange="syncStats(this)">
                        ${createOptions(availableStats)}
                    </select>
                </td>

                <td>
                    <select class="stat-select sub-stat-select" onchange="syncStats(this)">
                        ${createOptions(availableStats)}
                    </select>
                </td>

                <td>
                    <select class="stat-select text-yellow">
                        ${createOptions(statsList)}
                    </select>
                </td>

                <td>
                    <select class="stat-select text-purple">
                        ${createOptions(pLineChoices)}
                    </select>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.onload = renderPlanner;
</script>

</body>
</html>
